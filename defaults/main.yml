# admin panel branding
wc_admin_title: Web Conductor
wc_admin_description: Admin panel, service overview, and links.

# installation directory on the target host
wc_dir: "{{ ansible_facts.user_dir }}/web-conductor"

# local user files directory to copy to the target host
wc_user_dir: "{{ playbook_dir }}/user"

# local directory for pulled files from the target host
wc_pull_dir: "{{ playbook_dir }}/pull/{{ inventory_hostname }}"

# whether to include the setup tasks (on main.yml)
wc_include_setup: true

# whether to setup docker (on setup.yml), requires geerlingguy.docker role
wc_setup_docker: true

# whether to setup user .profile, adds .venv/bin to PATH and cd to wc_dir
wc_setup_user_profile: true

# extra pip requirements, core packages, avoid changing)
wc_pip_core_requirements:
  - certbot~=5.6

# extra pip requirements, user packages (e.g. certbot plugins)
wc_pip_user_requirements: []
  # - certbot-dns-ovh

# docker compose ansible options (community.docker.docker_compose_v2)
wc_compose_state: present
wc_compose_build: always
wc_compose_pull: policy

# docker compose project name
wc_compose_name: wc

# defaults for services with x-web-conductor
wc_compose_service_base:
  restart: unless-stopped

# logging configuration for services with x-web-conductor (loki only)
wc_compose_logging_driver: "{{ wc_compose_name }}-loki-docker-driver"
wc_compose_logging_options:
  # https://docs.docker.com/engine/logging/configure/
  mode: non-blocking
  max-buffer-size: 10m
  # https://grafana.com/docs/loki/latest/send-data/docker-driver/
  # https://github.com/grafana/loki/blob/main/clients/cmd/docker-driver/config.go
  # https://github.com/grafana/loki/blob/main/clients/pkg/util/config.go
  loki-url: http://127.0.0.1:3100/loki/api/v1/push
  loki-max-backoff: 5s # default is 5m (too long, can cause deadlocks)

# whether to enable buildx default attestations during compose build, they will
# cause idempotency issues when wc_compose_build is set to 'always', the images
# will differ every time and the containers will be recreated
wc_compose_default_attestations: false

# whether to generate wildcard certificates when multiple subdomains are found
# for a given domain (all certificates are grouped by the base domain)
wc_certs_generate_wildcards: true

# TODO: extra domains

# certbot email address for Let's Encrypt account registration
wc_certbot_email: admin@localhost

# certbot staging mode, set to false to generate the final certificates
wc_certbot_staging: true

# extra arguments for 'certbot certonly', this should be used to setup the DNS
# challenge plugins (use wc_pip_user_requirements to install the plugins)
wc_certbot_extra_args: []
  # - --verbose
  # - --dns-ovh
  # - --dns-ovh-credentials={{ wc_dir }}/user/secrets/ovh.ini
  # - --dns-ovh-propagation-seconds=20

# host for admin routes (e.g. dashboard, metrics, etc.)
wc_traefik_admin_host: "{{ wc_compose_name }}.localhost"

# whether to restrict admin routes to the internal network (e.g. wireguard)
wc_traefik_admin_use_internal: false

# whether to enable basic auth for admin routes (see wc_traefik_auth_users)
wc_traefik_admin_use_auth: true

# authentication for admin routes
# create a new password hash with: htpasswd -nB admin
# or: docker run --rm -it alpine:latest sh -c "apk add apache2-utils && htpasswd -nB admin"
wc_traefik_auth_users:
  - admin:$2y$05$/2fEzWkXRrlWT.dOLn.jXOadzvVLz3dR9VBkMaVk9wuvJx9wVH2Xe # admin:admin

# wireguard configuration (https://github.com/linuxserver/docker-wireguard)
wc_wireguard_server_url: "{{ ansible_facts.default_ipv4.address }}"
wc_wireguard_server_port: 51820
wc_wireguard_peers: 1
wc_wireguard_internal_subnet: 10.13.13.0
wc_wireguard_allowed_ips: 0.0.0.0/0, ::/0

# homepage configuration
# https://gethomepage.dev/configs/settings/
wc_homepage_settings:
  title: "{{ wc_admin_title }}"
  description: "{{ wc_admin_description }}"
  # XXX: is there a way to not list all the groups here but still have the
  # bookmarks be last (with style row)? the user must be free to use any name!
  layout:
    Core:
    Telemetry:
    User Services:
    Web Conductor:
      style: row
      columns: 4
# https://gethomepage.dev/configs/bookmarks/
wc_homepage_bookmarks:
  - Web Conductor:
      - goncalomb/web-conductor:
          - icon: si-github
            href: https://github.com/goncalomb/web-conductor
      - goncalomb:
          - icon: si-github
            href: https://github.com/goncalomb
      - goncalomb.com:
          - icon: mdi-web
            href: https://goncalomb.com/
      - "@goncalomb":
          - icon: si-mastodon
            href: https://fosstodon.org/@goncalomb
# https://gethomepage.dev/configs/info-widgets/
wc_homepage_widgets:
  - greeting:
      text_size: 2xl
      text: "{{ wc_admin_title }}"
  - resources:
      cpu: true
      memory: true
      disk: /
      uptime: true
  - greeting:
      text_size: sm
      text: "{{ wc_admin_description }}"

# grafana dashboards to download
wc_grafana_dashboard_ids:
  - 1860-45 # https://grafana.com/grafana/dashboards/1860-node-exporter-full/
  - 17346-9 # https://grafana.com/grafana/dashboards/17346-traefik-official-standalone-dashboard/
  - 4475-5 # https://grafana.com/grafana/dashboards/4475-traefik/
  - 11462-1 # https://grafana.com/grafana/dashboards/11462-traefik-2/
