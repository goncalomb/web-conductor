services:
  prometheus:
    image: prom/prometheus:v3
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=/prometheus
    x-web-conductor:
      route:
        path: /prometheus
        admin: true

  prometheus-node-exporter:
    image: prom/node-exporter:v1
    # ensure that wc_compose_service_base is applied
    x-web-conductor: {}

  loki:
    image: grafana/loki:3.7.0
    restart: unless-stopped
    ports:
      - 127.0.0.1:3100:3100 # bind to localhost for the logging driver
    volumes:
      - ./configs/loki/config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

  grafana:
    image: grafana/grafana:13.0
    volumes:
      - ./configs/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    x-web-conductor:
      route:
        path: /grafana
        admin: true

volumes:
  prometheus-data:
  loki-data:
