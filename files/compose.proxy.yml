services:
  traefik:
    build: ./services/traefik
    init: true
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/letsencrypt/live/:/etc/letsencrypt/live/:ro
      - /etc/letsencrypt/archive/:/etc/letsencrypt/archive/:ro
      - ./log/traefik/:/var/log/traefik/
    secrets:
      - traefik_htpasswd

  limbo:
    build: ./services/limbo
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.limbo-http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.limbo-http.priority=1"
      - "traefik.http.routers.limbo-https.rule=PathPrefix(`/`)"
      - "traefik.http.routers.limbo-https.priority=1"
      - "traefik.http.routers.limbo-https.tls"
    environment:
      - "LIMBO_DEBUG="

secrets:
  traefik_htpasswd:
    file: ./secrets/traefik_htpasswd
