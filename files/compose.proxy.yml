services:
  traefik:
    build: ./services/traefik
    init: true
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/letsencrypt/live/:/etc/letsencrypt/live/:ro
      - /etc/letsencrypt/archive/:/etc/letsencrypt/archive/:ro
      - ./log/traefik/:/var/log/traefik/
    secrets:
      - traefik_htpasswd

  limbo:
    build: ./services/limbo
    restart: always
    environment:
      - "LIMBO_DEBUG="
    x-web-conductor:
      route:
        path: /
        priority: 1

secrets:
  traefik_htpasswd:
    file: ./secrets/traefik_htpasswd
