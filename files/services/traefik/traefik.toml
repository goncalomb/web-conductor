[api]

[metrics]
    [metrics.prometheus]
        manualRouting = true

[entryPoints]
    [entryPoints.http]
        address = ":80"
    [entryPoints.https]
        address = ":443"
    [entryPoints.traefik]
        address = ":81"
    [entryPoints.metrics]
        address = ":82"

[log]
    filePath = "/var/log/traefik/traefik.log"
    format = "json"
    level = "INFO"

[accessLog]
    filePath = "/var/log/traefik/access.log"
    format = "json"
    [accessLog.fields.headers.names]
        "User-Agent" = "keep"
        "Referer" = "keep"

[providers.docker]
    exposedbydefault = false

[providers.file]
    directory = "/etc/traefik/dynamic"
